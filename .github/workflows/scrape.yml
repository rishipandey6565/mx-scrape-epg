name: Daily Schedule Scraper

on:
  schedule:
    # 5:50 AM Mexico City Time (UTC-6) -> 11:50 UTC
    - cron: '50 11 * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Scraper Script
        env:
          SCRAPE_WORKERS: 20
        run: python scraper.py
        
      - name: Run Image Downloader Script
        env:
          IMAGE_WORKERS: 50
        run: python image_downloader.py
        
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -d "schedule" ]; then git add schedule/; fi
          if [ -d "downloaded-images" ]; then git add downloaded-images/; fi
          if [ -f "scrape.log" ]; then git add scrape.log; fi
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update schedules and images [skip ci]"
            git push
          fi

      - name: Sync Schedule to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          # Syncs the local schedule folder to the root 'schedule' folder in R2
          aws s3 sync schedule/ s3://programaciontv/schedule/ \
            --endpoint-url https://50e4a65f087212ff2d4e1b79caa134ec.r2.cloudflarestorage.com \
            --delete

      - name: Sync Images to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          # Syncs the local downloaded-images folder to wp-admin/uploads/downloaded-images in R2
          aws s3 sync downloaded-images/ s3://programaciontv/wp-content/uploads/downloaded-images/ \
            --endpoint-url https://50e4a65f087212ff2d4e1b79caa134ec.r2.cloudflarestorage.com \
            --delete

      - name: Purge Cloudflare Cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/6268c94174ccecb6c0c43f5c760131df/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}'
