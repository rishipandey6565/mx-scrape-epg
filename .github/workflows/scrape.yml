name: Daily Schedule Scraper

on:
  schedule:
    # 5:50 AM Mexico City Time (UTC-6) -> 11:50 UTC
    - cron: '50 11 * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Scraper Script
        env:
          SCRAPE_WORKERS: 20
        run: python scraper.py
        
      - name: Run Image Downloader Script
        env:
          IMAGE_WORKERS: 50
        run: python image_downloader.py
        
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add schedule/ downloaded-images/ scrape.log
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update schedules and images [skip ci]"
            git push
          fi
